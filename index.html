<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>모여봐요 한동맛집</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Pretendard", sans-serif;
      }

      body {
        background-image: url("/food/food/이미지/bg1.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        text-align: center;
      }

      .main-title {
        width: 620px;
        max-width: 1400px;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .main-title:hover {
        transform: scale(1.03);
      }

      .sub-text {
        margin-top: 20px;
        font-size: 28px;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="/--team-project/second.html">
        <img
          src="/--team-project/title.png"
          alt="모여봐요 한동맛집"
          class="main-title"
        />

      <div class="sub-text">맛집을 골라주세요!</div>
    </div>
  </body>
</html>
